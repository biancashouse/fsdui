pipelines:
  default:
    - step:
        name: Sync GitHub Mirror
        image: alpine/git:latest
        clone:
          enabled: false
        script:
          - git clone --bare git@bitbucket.org:biancashouse/fsdui.git
          - cd fsdui.git
          - git push --mirror git@github.com:biancashouse/fsdui.git
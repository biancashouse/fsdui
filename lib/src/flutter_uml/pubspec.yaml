name: flutter_uml
description: >-
  A Flutter widget for rendering PlantUML and Mermaid diagrams via a Kroki
  server. Supports web, mobile, and desktop platforms.
version: 0.1.0
homepage: https://github.com/your-username/flutter_uml
repository: https://github.com/your-username/flutter_uml
issue_tracker: https://github.com/your-username/flutter_uml/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  archive: ">=4.0.0 <5.0.0"
  flutter:
    sdk: flutter
  flutter_svg: ">=2.0.0 <3.0.0"
  web: ">=0.5.0 <2.0.0"

dev_dependencies:
  flutter_lints: ">=4.0.0 <7.0.0"
  flutter_test:
    sdk: flutter

flutter:
  # This package does not use Material Design icons or assets.
